<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - 代码实践平台</title>
    <!-- ECharts 国内CDN -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 22px; }
        .header-info { font-size: 14px; opacity: 0.9; }
        .container {
            max-width: 1400px; margin: 0 auto; padding: 30px 40px;
        }
        .toolbar {
            display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap;
        }
        .toolbar select, .toolbar button {
            padding: 10px 18px; border-radius: 8px;
            border: 1px solid #ddd; font-size: 14px;
            background: white; cursor: pointer;
        }
        .toolbar button {
            background: #667eea; color: white; border: none;
            font-weight: 500; transition: all 0.2s;
        }
        .toolbar button:hover {
            background: #5a6fd6; transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        .toolbar button.secondary { background: #48bb78; }
        .toolbar button.danger { background: #f56565; }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-value {
            font-size: 36px; font-weight: bold; color: #667eea;
        }
        .stat-label { color: #888; font-size: 14px; margin-top: 5px; }
        .panel {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 25px; overflow: hidden;
        }
        .panel-header {
            padding: 20px 25px; border-bottom: 1px solid #eee;
            font-size: 16px; font-weight: 600; color: #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-body { padding: 25px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            background: #f8f9fa; padding: 14px; text-align: left;
            font-weight: 600; color: #555; border-bottom: 2px solid #eee;
        }
        td { padding: 14px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #f8f9fa; }
        .score-badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .score-high { background: #c6f6d5; color: #22543d; }
        .score-mid { background: #feebc8; color: #744210; }
        .score-low { background: #fed7d7; color: #742a2a; }
        .plagiarism-badge {
            display: inline-block; padding: 4px 10px;
            border-radius: 4px; font-size: 12px; font-weight: 600;
        }
        .plag-safe { background: #c6f6d5; color: #22543d; }
        .plag-warning { background: #feebc8; color: #744210; }
        .plag-danger { background: #fed7d7; color: #742a2a; }
        .btn-view {
            padding: 6px 14px; background: #ebf8ff; color: #3182ce;
            border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
        }
        #heatmap { width: 100%; height: 400px; }
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; width: 90%; max-width: 1000px;
            max-height: 90vh; border-radius: 12px; overflow: hidden;
        }
        .modal-header {
            padding: 20px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
        .code-compare {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        .code-block {
            background: #1e1e1e; color: #d4d4d4; padding: 15px;
            border-radius: 8px; font-family: 'Consolas', monospace;
            font-size: 13px; line-height: 1.6;
            overflow-x: auto; white-space: pre;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>👨‍🏫 教师管理后台</h1>
            <div class="header-info">代码实践平台 · 成绩管理与查重分析</div>
        </div>
        <div class="header-info" id="currentTime"></div>
    </div>

    <div class="container">
        <div class="toolbar">
            <select id="taskSelect">
                <option value="">选择任务...</option>
            </select>
            <button onclick="loadSubmissions()">🔄 刷新数据</button>
            <button class="secondary" onclick="runPlagiarism()">🔍 运行查重</button>
            <button class="secondary" onclick="exportExcel()">📥 导出Excel</button>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">总提交数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAvg">0</div>
                <div class="stat-label">平均分</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPlag">0</div>
                <div class="stat-label">疑似抄袭</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statHigh">0</div>
                <div class="stat-label">优秀(≥90)</div>
            </div>
        </div>

        <!-- 学生管理面板 -->
        <div class="panel" id="studentPanel" style="border-left:4px solid #667eea;">
            <div class="panel-header">
                <span>👥 学生账号管理</span>
                <span style="font-size:12px;color:#888;">创建和管理学生登录账号</span>
            </div>
            <div class="panel-body">
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;">
                    <input type="text" id="newUsername" placeholder="账号" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;flex:1;min-width:120px;">
                    <input type="text" id="newPassword" placeholder="密码" value="123456" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;flex:1;min-width:100px;">
                    <input type="text" id="newStudentName" placeholder="姓名" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;flex:1;min-width:100px;">
                    <select id="newCourse" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
                        <option value="数据结构2026">数据结构</option>
                        <option value="算法设计2026">算法设计</option>
                        <option value="C++程序设计">C++程序设计</option>
                    </select>
                    <button onclick="createStudent()" style="padding:8px 16px;background:#48bb78;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;">➕ 添加学生</button>
                </div>
                <div id="studentList" style="font-size:13px;color:#666;">加载中...</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>🔥 查重热力图</span>
                <span style="font-size:12px;color:#888;">颜色越深表示相似度越高</span>
            </div>
            <div class="panel-body">
                <div id="heatmap"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>📊 学生成绩明细</span>
                <input type="text" placeholder="搜索学号/姓名..." 
                       style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;"
                       onkeyup="filterTable(this.value)">
            </div>
            <div class="panel-body">
                <table>
                    <thead>
                        <tr>
                            <th>学号</th><th>姓名</th><th>总分</th>
                            <th>功能正确性</th><th>代码规范</th>
                            <th>算法效率</th><th>代码结构</th>
                            <th>查重率</th><th>最相似</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="submissionsTable">
                        <tr>
                            <td colspan="10" style="text-align:center;color:#888;padding:40px;">
                                请选择任务后加载数据
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="compareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔍 代码对比</h3>
                <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;">×</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom:15px;">
                    <span id="compareInfo" style="font-size:14px;color:#555;"></span>
                </div>
                <div class="code-compare">
                    <div>
                        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#667eea;">学生A</div>
                        <div class="code-block" id="codeA"></div>
                    </div>
                    <div>
                        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#764ba2;">学生B</div>
                        <div class="code-block" id="codeB"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentData = [];
        let heatmapChart;

        setInterval(function() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
        }, 1000);

        window.onload = async function() {
            // 验证教师身份
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'teacher-login.html';
                return;
            }
            try {
                const r = await fetch(API_BASE + '/auth/verify', {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const d = await r.json();
                if (d.code !== 200 || d.data.role !== 'teacher') {
                    localStorage.removeItem('token');
                    window.location.href = 'teacher-login.html';
                    return;
                }
            } catch(e) {
                console.log('Verify failed, redirecting to login');
                window.location.href = 'teacher-login.html';
                return;
            }

            await loadTasks();
            heatmapChart = echarts.init(document.getElementById('heatmap'));
            loadStudents();
            document.getElementById('username').value = localStorage.getItem('username') || 'admin';
        };

        async function loadTasks() {
            try {
                const res = await fetch(API_BASE + '/teacher/tasks');
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    const select = document.getElementById('taskSelect');
                    select.innerHTML = '<option value="">选择任务...</option>';
                    data.data.forEach(function(t) {
                        const opt = document.createElement('option');
                        opt.value = t.task_id;
                        opt.textContent = t.task_id + ' - ' + t.title + ' (' + t.course + ')';
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.log('加载任务失败', e);
            }
        }

        async function loadSubmissions() {
            const taskId = document.getElementById('taskSelect').value;
            if (!taskId) { alert('请先选择任务'); return; }

            try {
                const res = await fetch(API_BASE + '/teacher/submissions?task_id=' + taskId);
                const result = await res.json();
                if (result.code === 200 && result.data) {
                    currentData = result.data.submissions || [];
                    renderTable(currentData);
                    renderStats(currentData);
                    renderHeatmap(currentData);
                }
            } catch (e) {
                console.log('加载数据失败', e);
                // 演示数据
                currentData = [
                    {student_id:'20231234', student_name:'张三', ai_score:{total_score:92, details:[
                        {category:'功能正确性', score:38, max_score:40},
                        {category:'代码规范', score:18, max_score:20},
                        {category:'算法效率', score:18, max_score:20},
                        {category:'代码结构', score:18, max_score:20}
                    ]}, plagiarism_max:12, plagiarism_with:'李四', code:'int main(){ return 0; }'},
                    {student_id:'20231235', student_name:'李四', ai_score:{total_score:88, details:[
                        {category:'功能正确性', score:35, max_score:40},
                        {category:'代码规范', score:17, max_score:20},
                        {category:'算法效率', score:18, max_score:20},
                        {category:'代码结构', score:18, max_score:20}
                    ]}, plagiarism_max:87, plagiarism_with:'张三', code:'int main(){ return 0; }'},
                    {student_id:'20231236', student_name:'王五', ai_score:{total_score:76, details:[
                        {category:'功能正确性', score:30, max_score:40},
                        {category:'代码规范', score:16, max_score:20},
                        {category:'算法效率', score:15, max_score:20},
                        {category:'代码结构', score:15, max_score:20}
                    ]}, plagiarism_max:91, plagiarism_with:'赵六', code:'int main(){ return 0; }'},
                ];
                renderTable(currentData);
                renderStats(currentData);
                renderHeatmap(currentData);
            }
        }

        function renderStats(data) {
            const total = data.length;
            const avg = total > 0 ? Math.round(data.reduce(function(s,d) { 
                return s + ((d.ai_score && d.ai_score.total_score) || 0); 
            }, 0) / total) : 0;
            const plag = data.filter(function(d) { return d.plagiarism_max > 50; }).length;
            const high = data.filter(function(d) { return ((d.ai_score && d.ai_score.total_score) || 0) >= 90; }).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAvg').textContent = avg;
            document.getElementById('statPlag').textContent = plag;
            document.getElementById('statHigh').textContent = high;
        }

        function renderTable(data) {
            const tbody = document.getElementById('submissionsTable');
            tbody.innerHTML = '';

            data.forEach(function(d) {
                const score = (d.ai_score && d.ai_score.total_score) || 0;
                const details = (d.ai_score && d.ai_score.details) || [];

                function getScore(cat) {
                    const item = details.find(function(x) { return x.category === cat; });
                    return item ? item.score : 0;
                }

                let scoreClass = 'score-mid';
                if (score >= 80) scoreClass = 'score-high';
                if (score < 60) scoreClass = 'score-low';

                let plagClass = 'plag-safe';
                if (d.plagiarism_max > 50) plagClass = 'plag-danger';
                else if (d.plagiarism_max > 30) plagClass = 'plag-warning';

                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + d.student_id + '</td>' +
                    '<td>' + d.student_name + '</td>' +
                    '<td><span class="score-badge ' + scoreClass + '">' + score + '</span></td>' +
                    '<td>' + getScore('功能正确性') + '/40</td>' +
                    '<td>' + getScore('代码规范') + '/20</td>' +
                    '<td>' + getScore('算法效率') + '/20</td>' +
                    '<td>' + getScore('代码结构') + '/20</td>' +
                    '<td><span class="plagiarism-badge ' + plagClass + '">' + d.plagiarism_max + '%</span></td>' +
                    '<td>' + (d.plagiarism_with || '-') + '</td>' +
                    '<td>' +
                    '<button class="btn-view" onclick="viewCode(' + JSON.stringify(d.student_id) + ')">查看代码</button>' +
                    (d.plagiarism_max > 30 ? '<button class="btn-view" style="margin-left:5px;background:#fed7d7;color:#742a2a;" onclick="compareCode(' + JSON.stringify(d.student_id) + ', ' + JSON.stringify(d.plagiarism_with) + ')">对比</button>' : '') +
                    '</td>';
                tbody.appendChild(tr);
            });
        }

        function renderHeatmap(data) {
            const students = data.map(function(d) { return d.student_name; });
            const matrix = [];

            for (let i = 0; i < data.length; i++) {
                for (let j = 0; j < data.length; j++) {
                    let value = 0;
                    if (i === j) value = 100;
                    else {
                        value = Math.abs(data[i].plagiarism_max - data[j].plagiarism_max) + Math.random() * 30;
                        value = Math.min(100, Math.round(value));
                    }
                    matrix.push([i, j, value]);
                }
            }

            const option = {
                tooltip: {
                    position: 'top',
                    formatter: function(p) {
                        return students[p.data[0]] + ' vs ' + students[p.data[1]] + '<br/>相似度: ' + p.data[2] + '%';
                    }
                },
                grid: { top: '10%', bottom: '15%', left: '15%', right: '10%' },
                xAxis: {
                    type: 'category', data: students,
                    splitArea: { show: true },
                    axisLabel: { rotate: 45, fontSize: 11 }
                },
                yAxis: {
                    type: 'category', data: students,
                    splitArea: { show: true },
                    axisLabel: { fontSize: 11 }
                },
                visualMap: {
                    min: 0, max: 100,
                    calculable: true, orient: 'horizontal',
                    left: 'center', bottom: '0%',
                    inRange: { color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695'] }
                },
                series: [{
                    type: 'heatmap', data: matrix,
                    label: { show: false },
                    emphasis: { itemStyle: { borderColor: '#333', borderWidth: 1 } }
                }]
            };

            heatmapChart.setOption(option);
        }

        async function runPlagiarism() {
            const taskId = document.getElementById('taskSelect').value;
            if (!taskId) { alert('请先选择任务'); return; }

            if (!confirm('确定运行查重？这可能需要几分钟。')) return;

            try {
                const res = await fetch(API_BASE + '/teacher/plagiarism/check?task_id=' + taskId + '&language=cpp', {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert(data.message);
                    loadSubmissions();
                } else {
                    alert('查重失败: ' + data.message);
                }
            } catch (e) {
                alert('查重服务暂时不可用');
            }
        }

        function exportExcel() {
            const taskId = document.getElementById('taskSelect').value;
            if (!taskId) { alert('请先选择任务'); return; }
            window.open(API_BASE + '/teacher/export/grades?task_id=' + taskId);
        }

        function filterTable(keyword) {
            const filtered = currentData.filter(function(d) {
                return d.student_id.includes(keyword) || d.student_name.includes(keyword);
            });
            renderTable(filtered);
        }

        function viewCode(studentId) {
            const student = currentData.find(function(d) { return d.student_id === studentId; });
            if (student) {
                alert('学号: ' + student.student_id + '\n姓名: ' + student.student_name + '\n\n代码:\n' + (student.code || '// 无代码').substring(0, 500));
            }
        }

        function compareCode(idA, idB) {
            const a = currentData.find(function(d) { return d.student_id === idA; });
            const b = currentData.find(function(d) { return d.student_name === idB || d.student_id === idB; });
            if (!a || !b) return;

            document.getElementById('compareInfo').textContent = 
                a.student_name + ' vs ' + b.student_name + ' | 相似度: ' + a.plagiarism_max + '%';
            document.getElementById('codeA').textContent = a.code || '// 代码未加载';
            document.getElementById('codeB').textContent = b.code || '// 代码未加载';
            document.getElementById('compareModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('compareModal').classList.remove('active');
        }

        document.getElementById('compareModal').addEventListener('click', function(e) {
            if (e.target === document.getElementById('compareModal')) closeModal();
        });

        window.addEventListener('resize', function() {
            heatmapChart && heatmapChart.resize();
        });

        // ===== 学生账号管理 =====
        const TOKEN = localStorage.getItem('token') || '';

        async function loadStudents() {
            try {
                const r = await fetch(API_BASE + '/auth/students/list', {
                    headers: {'Authorization': 'Bearer ' + TOKEN}
                });
                const d = await r.json();
                if (d.code === 200 && d.data) {
                    var el = document.getElementById('studentList');
                    if (d.data.length === 0) {
                        el.innerHTML = '<span style="color:#888;">暂无学生账号，请在上方添加</span>';
                        return;
                    }
                    var html = '<table style="width:100%;font-size:13px;"><thead><tr style="background:#f7f8fc;"><th style="padding:8px;text-align:left;">账号</th><th style="padding:8px;text-align:left;">姓名</th><th style="padding:8px;text-align:left;">课程</th><th style="padding:8px;text-align:left;">创建时间</th><th style="padding:8px;">操作</th></tr></thead><tbody>';
                    for (var i = 0; i < d.data.length; i++) {
                        var s = d.data[i];
                        html += '<tr>' +
                            '<td style="padding:6px 8px;">' + s.username + '</td>' +
                            '<td style="padding:6px 8px;">' + (s.student_name || '-') + '</td>' +
                            '<td style="padding:6px 8px;">' + (s.course || '-') + '</td>' +
                            '<td style="padding:6px 8px;">' + (s.created_at || '').substring(0, 10) + '</td>' +
                            '<td style="padding:6px 8px;text-align:center;">' +
                            '<button onclick="deleteStudent(' + s.id + ')" style="padding:4px 10px;background:#f56565;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;">删除</button></td></tr>';
                    }
                    html += '</tbody></table>';
                    el.innerHTML = html;
                }
            } catch(e) {
                document.getElementById('studentList').innerHTML = '<span style="color:#e53e3e;">加载失败: ' + e.message + '</span>';
            }
        }

        async function createStudent() {
            var username = document.getElementById('newUsername').value.trim();
            var password = document.getElementById('newPassword').value;
            var studentName = document.getElementById('newStudentName').value.trim();
            var course = document.getElementById('newCourse').value;
            if (!username || !password || !studentName) {
                alert('请填写完整信息');
                return;
            }
            try {
                var r = await fetch(API_BASE + '/auth/students/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN},
                    body: JSON.stringify({username: username, password: password, student_name: studentName, course: course})
                });
                var d = await r.json();
                if (d.code === 200) {
                    alert('学生账号创建成功！');
                    document.getElementById('newUsername').value = '';
                    document.getElementById('newStudentName').value = '';
                    loadStudents();
                } else {
                    alert('创建失败: ' + (d.message || ''));
                }
            } catch(e) {
                alert('网络错误: ' + e.message);
            }
        }

        async function deleteStudent(id) {
            if (!confirm('确定删除此学生账号？')) return;
            try {
                var r = await fetch(API_BASE + '/auth/students/delete?user_id=' + id, {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + TOKEN}
                });
                var d = await r.json();
                if (d.code === 200) {
                    loadStudents();
                } else {
                    alert('删除失败: ' + (d.message || ''));
                }
            } catch(e) {
                alert('网络错误: ' + e.message);
            }
        }
    </script>
