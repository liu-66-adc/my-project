<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码实践平台 - 学生登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500; }
        input {
            width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 15px; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .teacher-link { text-align: center; margin-top: 20px; font-size: 13px; }
        .teacher-link a { color: #667eea; text-decoration: none; }
        .error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; text-align: center; display: none; padding: 8px; background: #fff5f5; border-radius: 6px; }
        .loading-spinner { display: none; text-align: center; margin-top: 10px; color: #667eea; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🚀 代码实践平台</h1>
        <p class="subtitle">AI智能评分 · 代码查重 · 即时反馈</p>

        <div id="errorMsg" class="error-msg"></div>

        <div class="form-group">
            <label>账号</label>
            <input type="text" id="username" placeholder="输入教师分配的账号" autocomplete="username">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
        </div>

        <button id="loginBtn" onclick="login()">进入学习</button>

        <div id="loading" class="loading-spinner">⏳ 登录中...</div>

        <div class="teacher-link">
            <a href="teacher-login.html">👨‍🏫 教师登录</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            errorEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = '请输入账号和密码';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: username, password: password})
                });
                const data = await res.json();

                if (data.code === 200) {
                    const info = data.data;
                    if (info.role !== 'student') {
                        errorEl.textContent = '此账号非学生账号，请使用教师登录入口';
                        errorEl.style.display = 'block';
                        btn.disabled = false;
                        loading.style.display = 'none';
                        return;
                    }
                    localStorage.setItem('token', info.token);
                    localStorage.setItem('username', info.username);
                    localStorage.setItem('studentName', info.student_name || username);
                    localStorage.setItem('course', info.course || '');
                    window.location.href = 'editor.html';
                } else {
                    errorEl.textContent = data.message || '登录失败';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请确认服务已启动';
                errorEl.style.display = 'block';
            }

            btn.disabled = false;
            loading.style.display = 'none';
        }

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
